---
name: Release
permissions: { contents: read }

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Dry Run
        default: false
        required: false
        type: boolean
      select:
        description: "Select container to build"
        required: false
        default: ""
        type: string
  push:
    paths:
      - ".github/workflows/release.yaml"
      - "containers/**"

jobs:
  discover-containers:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Find Containers
        id: discover
        uses: mirceanton/action-folder-matrix@955d4f90db109dff0e99542877bd25e52544db9c # v3.0.7
        with:
          path: ./containers
          changed-only: ${{ github.event_name != 'workflow_dispatch' }}
          filter: ${{ inputs.select }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: discover-containers
    runs-on: ubuntu-latest
    if: fromJson(needs.discover-containers.outputs.containers).directory[0] != null
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-containers.outputs.containers) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      
      - name: Log in to Container Registry
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
        with:
          registry: ghcr.io
          username: mirceanton
          password: ${{ secrets.GHCR_RW_TOKEN }}

      - name: Build and push Docker image
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          push: ${{ (github.ref_name == 'main') || ( github.event_name == 'workflow_dispatch' && inputs.dry-run == false)}}
          source: ./containers/${{ matrix.directory }}
          files: ./docker-bake.hcl
          targets: default
        env:
          GIT_SHA: ${{ github.sha }}
