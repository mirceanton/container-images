---
name: Release
permissions: { contents: read }

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Dry Run
        default: false
        required: false
        type: boolean
      select:
        description: "Select container to build"
        required: false
        default: ""
        type: string
  push:
    paths:
      - ".github/workflows/docker-cd.yaml"
      - "containers/**"

jobs:
  discover-containers:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Find Containers
        id: discover
        uses: mirceanton/action-folder-matrix@90a63a668ac8dfc4e099e7a8dc3ff5defe3e01a1 # v3.0.2
        with:
          path: ./containers
          changed-only: ${{ github.event_name != 'workflow_dispatch' }}
          filter: ${{ inputs.select }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: discover-containers
    runs-on: ubuntu-latest
    if: fromJson(needs.discover-containers.outputs.containers).directory[0] != null
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-containers.outputs.containers) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      
      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: mirceanton
          password: ${{ secrets.GHCR_RW_TOKEN }}

      - name: Build and push Docker image
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          push: ${{ (github.ref_name == 'main') || ( github.event_name == 'workflow_dispatch' && inputs.dry-run == false)}}
          source: ./containers/${{ matrix.directory }}
          files: ./docker-bake.hcl
          targets: default
        env:
          GIT_SHA: ${{ github.sha }}
